<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Salgados - Sabores do Mundo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍝 Receitas Salgadas</h1>
        <nav><a href="index.html">Voltar para Home</a></nav>
    </header>

    <main class="recipe-grid">
        <div class="card">
            <img src="images/strognoff.jpg" alt="Strogonoff">
            <div class="card-content">
                <h3>Strogonoff de Frango</h3>
                <label for="modal-strogonoff" class="btn-ver">Ver Passo a Passo</label>
            </div>
        </div>
    </main>

    <input type="checkbox" id="modal-strogonoff" class="modal-check">
    <div class="modal">
        <div class="modal-content">
            <label for="modal-strogonoff" class="close-btn">&times;</label>
            <h2>Strogonoff de Frango</h2>
            <div class="video-container">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/fu_FxPsgNgE?si=CFnRV5JM_CD3Kc6D" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>" frameborder="0" allowfullscreen></iframe>
            </div>
            <h3>Ingredientes</h3>
            <p>500g de frango, 1 cebola, ketchup, mostarda, 1 caixa de creme de leite.</p>
        </div>
    </div>
</body>
</html>
