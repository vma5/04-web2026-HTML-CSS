<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sabores do Mundo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1> Minha Conta</h1>
        <nav><a href="index.html">Home</a></nav>
    </header>

    <main class="login-container">
        <div class="card-login">
            <h2>Entrar ou Cadastrar</h2>
            <form action="#">
                <input type="text" placeholder="Nome de usuário" required>
                <input type="email" placeholder="Seu E-mail">
                <input type="password" placeholder="Sua Senha" required>
                <button type="submit" class="btn-banner" style="border:none; width:100%; cursor:pointer;">Confirmar Cadastro</button>
            </form>
            <p style="margin-top:15px; font-size: 0.8rem;">O cadastro permite que você poste receitas (Em breve).</p>
        </div>
    </main>
</body>
</html>
