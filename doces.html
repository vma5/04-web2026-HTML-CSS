<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Doces - Sabores do Mundo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍰 Receitas Doces</h1>
        <nav><a href="index.html">Voltar para Home</a></nav>
    </header>

    <main class="recipe-grid">
        <div class="card">
            <img src="images/bolo de cenoura.jpg" alt="Bolo de Cenoura">
            <div class="card-content">
                <h3>Bolo de Cenoura com Chocolate</h3>
                <label for="modal-bolo" class="btn-ver">Ver Passo a Passo</label>
            </div>
        </div>
    </main>

    <input type="checkbox" id="modal-bolo" class="modal-check">
    <div class="modal">
        <div class="modal-content">
            <label for="modal-bolo" class="close-btn">&times;</label>
            <h2>Bolo de Cenoura</h2>
            <div class="video-container">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/JH3F9TyH7hg?si=aZQRp4nB_cmwo3UG" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>" frameborder="0" allowfullscreen></iframe>
            </div>
            <h3>Ingredientes</h3>
            <p>3 cenouras, 4 ovos, 2 xíc. de açúcar, 1 xíc. de óleo, 2 xíc. de farinha, 1 colher de fermento.</p>
        </div>
    </div>
</body>
</html>
